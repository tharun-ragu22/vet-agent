name: CI for Pull Requests

on:
  pull_request:
    branches: [main]

env:
  LOCAL_MODEL_URL: "http://localhost:11434/v1"
  LOCAL_MODEL_NAME: "gemma4:latest"

jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          # Install a specific version of uv.
          version: "0.11.23"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          uv run pytest -v

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Matrix Output
        id: set-matrix
        run: |
          # Initialize an empty JSON array string
          FILES_JSON="["
          
          for file in **/eval_*; do
            if [ -f "$file" ]; then
              base_name=$(basename "$file")
              clean_name="${base_name%%.*}"
              
              # Append the clean name to our JSON string safely
              FILES_JSON="${FILES_JSON}\"${clean_name}\","
            fi
          done
          
          # Remove the trailing comma (if files were found) and close the array
          FILES_JSON=$(echo "$FILES_JSON" | sed 's/,$//')
          FILES_JSON="${FILES_JSON}]"
          
          echo "Generated JSON: $FILES_JSON"
          
          # Set the output for the next job to use
          echo "matrix=${FILES_JSON}" >> $GITHUB_OUTPUT

  agent_evals:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        eval_name: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Install a specific version of uv.
          version: "0.11.23"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and Pull Gemma
        run: |
          ollama serve &
          # Wait for Ollama to be ready
          sleep 5
          ollama pull $LOCAL_MODEL_NAME

      - name: Run agent evals for ${{ matrix.eval_name }}
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          uv run python -m agent.${{ matrix.eval_name}}

  agent-eval-pass:
    needs: agent_evals
    runs-on: ubuntu-latest
    steps:
      - name: All evals passed
        run: echo "All agent evals passed successfully!"

  acceptance-tests:
    needs: [agent-eval-pass, unit_tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Install a specific version of uv.
          version: "0.11.23"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Start FastAPI app
        env:
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          uv run uvicorn main:app --host 0.0.0.0 --port 8000 &
          is_healthy=0
          for i in {1..10}; do
            if curl -s http://localhost:8000/health; then
              is_healthy=1
              break
            fi
            sleep 2
          done
          if [ $is_healthy -eq 0 ]; then
            echo "FastAPI app did not become healthy in time."
            exit 1
          fi
          

      - name: Run acceptance tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          uv run pytest acceptance_tests.py -v
